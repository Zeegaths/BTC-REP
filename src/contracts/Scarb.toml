[package]
name = "btc_reputation"
version = "0.1.0"
edition = "2024_07"
cairo-version = "2.13.1"

[dependencies]
starknet = "2.13.1"
openzeppelin_token = "3.0.0"
openzeppelin_access = "3.0.0"
openzeppelin_introspection = "3.0.0"

[dev-dependencies]
snforge_std = "0.51.1"

[[target.starknet-contract]]
sierra = true
casm = true

[scripts]
test = "snforge test"

[tool.fmt]
sort-module-level-items = true
max-line-length = 120

[tool.scarb]
allow-prebuilt-plugins = ["snforge_std"]
